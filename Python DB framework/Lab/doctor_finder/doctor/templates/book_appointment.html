{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-lg rounded-4 p-4">
                <h2 class="text-success fw-bold">Book Appointment</h2>
                <p class="text-muted">Appointment with <b>{{ doctor.name }}</b></p>
                {% if msg %}<div class="alert alert-success">{{ msg }}</div>{% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <input type="text" name="patient_name" class="form-control mb-3" placeholder="Patient Name">
                    <input type="email" name="email" class="form-control mb-3" placeholder="Email">
                    <input type="text" name="mobile" class="form-control mb-3" placeholder="Mobile">
                    <div class="row">
                        <div class="col-md-6"><input type="date" name="date" class="form-control mb-3"></div>
                        <div class="col-md-6"><input type="time" name="time" class="form-control mb-3"></div>
                    </div>
                    <textarea name="message" class="form-control mb-3" placeholder="Problem / Message"></textarea>
                    <button class="btn btn-success w-100 rounded-pill">Continue to Payment</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
